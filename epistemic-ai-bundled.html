<body class="min-h-screen p-4 md:p-8 flex flex-col items-center">

    <div id="app" class="max-w-7xl w-full">

    </div>

        <div class="flex min-h-full items-center justify-center p-4 text-center sm:p-0">

                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
                <div id="modal-content"></div>
            </div>
        </div>
    </div>

    <script>
    /* ── All rendering is driven by epistemic-ai-data.js ── */
    /* DATA is loaded via <script src="epistemic-ai-data.js"> in <head> */

    /* ── Color maps ── */
    const dotColors = { emerald: 'bg-emerald-600', blue: 'bg-blue-600', amber: 'bg-amber-500', rose: 'bg-rose-600' };
    const borderLColors = { emerald: 'border-l-emerald-600', blue: 'border-l-blue-600', amber: 'border-l-amber-500', rose: 'border-l-rose-600', purple: 'border-l-purple-500', slate: 'border-l-slate-700' };
    const textColors = { emerald: 'text-emerald-700', blue: 'text-blue-700', amber: 'text-amber-700', rose: 'text-rose-700', purple: 'text-purple-700', slate: 'text-slate-700' };

    /* ── Main render ── */
    function render() {
        const d = DATA;
        const app = document.getElementById('app');

        app.innerHTML = `
        <!-- Header -->
        <header class="mb-12 text-center md:text-left">
            <div class="flex flex-col md:flex-row md:items-center gap-3 mb-4">
                <h1 class="text-4xl md:text-5xl font-semibold tracking-tight text-slate-900">${d.page.title}</h1>
                <span class="inline-flex items-center self-start md:self-center px-3 py-1 rounded-full bg-slate-200 text-slate-600 text-xs font-semibold uppercase tracking-widest border border-slate-300">${d.page.version_badge}</span>
            </div>
            <p class="text-xl text-slate-700 max-w-4xl leading-relaxed">${d.page.subtitle}</p>
        </header>

        <!-- Section 1 -->
        ${renderSection1(d.section1)}

        <!-- Section 2 -->
        ${renderSection2(d)}

        <!-- Section 3 -->
        ${renderSection3(d.academicGrounding)}
        `;

        renderMatrix();
    }

    /* ── Section 1: Foundation ── */
    function renderSection1(s) {
        const rumsfeldCells = s.rumsfeld_grid.cells.flat();
        const quadrantDescs = {};
        s.quadrants.forEach(q => { quadrantDescs[q.name] = q.desc; });
        const rumsfeldCellsHtml = rumsfeldCells.map(name => `
            <div class="bg-slate-50 border border-slate-200 text-slate-900 p-4 rounded-lg flex flex-col items-center justify-center shadow-sm gap-1">
                <span class="font-semibold text-sm">${name}</span>
                <span class="text-xs text-slate-500 text-center leading-tight">${quadrantDescs[name] || ''}</span>

        const johariCells = s.johari_grid.cells.flat();
        const johariCellsHtml = johariCells.map(c => `
            <div class="bg-slate-50 border border-slate-200 text-slate-900 p-4 rounded-lg flex flex-col items-center justify-center shadow-sm gap-1">
                <span class="font-semibold text-sm">${c.name}</span>
                <span class="text-[10px] text-slate-400 uppercase tracking-wider">${c.maps_to}</span>
            </div>`).join('');

        return `
        <details class="mb-16">
            <summary class="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-slate-300 cursor-pointer select-none hover:bg-slate-50 transition-colors list-none">

                    <span class="bg-slate-900 text-white w-8 h-8 rounded-full flex items-center justify-center text-sm">${s.number}</span>

                </h2>

        <div class="bg-white p-6 md:p-8 rounded-b-2xl shadow-sm border border-slate-300 border-t-0 -mt-4">
            <p class="text-slate-700 leading-relaxed mb-4 font-normal">${s.description}</p>
            <p class="text-slate-700 leading-relaxed mb-4 font-normal">${s.johari_callout}</p>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-6">

                    <h3 class="text-sm font-semibold text-slate-700 mb-3 text-center">Rumsfeld / Zizek Taxonomy</h3>
                    <div class="rumsfeld-grid text-sm text-center">
                        <div></div>
                        ${s.rumsfeld_grid.col_headers.map(h => `<div class="font-semibold text-slate-500 uppercase tracking-wider text-xs pb-2 border-b border-slate-200">${h.label}<br><span class="text-[10px] text-slate-400">${h.sublabel}</span></div>`).join('')}
                        <div class="font-semibold text-slate-500 uppercase tracking-wider text-xs pr-3 border-r border-slate-200 flex items-center justify-end text-right">${s.rumsfeld_grid.row_headers[0].label.replace(' ', '<br>')}</div>
                        ${rumsfeldCellsHtml.split('</div>').slice(0, 2).join('</div>') + '</div>'}
                        <div class="font-semibold text-slate-500 uppercase tracking-wider text-xs pr-3 border-r border-slate-200 flex items-center justify-end text-right">${s.rumsfeld_grid.row_headers[1].label.replace(' ', '<br>')}</div>
                        ${rumsfeldCellsHtml.split('</div>').slice(2, 4).join('</div>') + '</div>'}
                    </div>
                </div>
                <div>
                    <h3 class="text-sm font-semibold text-slate-700 mb-3 text-center">Johari Window (1955)</h3>
                    <div class="rumsfeld-grid text-sm text-center">
                        <div></div>
                        ${s.johari_grid.col_headers.map(h => `<div class="font-semibold text-slate-500 uppercase tracking-wider text-xs pb-2 border-b border-slate-200">${h.label}<br><span class="text-[10px] text-slate-400">${h.sublabel}</span></div>`).join('')}
                        <div class="font-semibold text-slate-500 uppercase tracking-wider text-xs pr-3 border-r border-slate-200 flex items-center justify-end text-right">Known<br>to Self</div>
                        ${johariCellsHtml.split('</div>').filter((_,i) => i < 2).map(s => s + '</div>').join('')}
                        <div class="font-semibold text-slate-500 uppercase tracking-wider text-xs pr-3 border-r border-slate-200 flex items-center justify-end text-right">Unknown<br>to Self</div>
                        ${johariCellsHtml.split('</div>').filter((_,i) => i >= 2 && i < 4).map(s => s + '</div>').join('')}
                    </div>
                    <p class="text-xs text-slate-400 mt-3 text-center">${s.johari_grid.caption}</p>
                </div>
            </div>
            <details open class="bg-slate-50 rounded-xl border border-slate-200">
                <summary class="p-3 cursor-pointer text-xs font-semibold text-slate-500 uppercase tracking-widest flex items-center gap-2 list-none select-none hover:text-slate-700 transition-colors">
                    Critical Distinction: Zizek vs. Polanyi
                    <span class="ml-auto text-slate-400">&#9662;</span>
                </summary>
                <div class="px-4 pb-4 pt-1 border-t border-slate-200">
                    <p class="text-sm text-slate-700">${s.critical_distinction}</p>
                </div>
            </details>
        </div>
        </details>`;
    }

    /* ── Section 2: Matrix ── */
    function renderSection2(d) {
        const s = d.section2;
        const legendHtml = s.legend.map(l => {
            if (l.tag) {
                return `<div class="flex items-center gap-2">
                    <span class="bg-purple-700 text-white text-[9px] font-semibold px-1.5 py-0.5 rounded-full uppercase tracking-wider">${l.tag}</span>
                    ${l.label}
                </div>`;
            }
            return `<div class="flex items-center gap-2"><span class="w-4 h-4 rounded-full bg-${l.color}-600 border border-slate-200 shadow-sm"></span> ${l.label}</div>`;
        }).join('');

        const footnotesHtml = s.footnotes.map(f =>
            `<p><span class="font-semibold text-slate-700">${f.marker}</span> ${f.text}</p>`
        ).join('');

        return `
        <section class="mb-16">
            <div class="w-full">
                <div class="matrix-wrapper bg-white p-4 md:p-8 rounded-2xl shadow-sm border border-slate-300">
                    <h2 class="text-2xl font-semibold mb-4 text-slate-900 flex items-center gap-3">
                        <span class="bg-slate-900 text-white w-8 h-8 rounded-full flex items-center justify-center text-sm">${s.number}</span>
                        ${s.title}
                    </h2>
                    <p class="text-slate-700 leading-relaxed font-normal mb-4">${s.description}</p>
                    <p class="text-slate-600 font-medium text-sm mb-8 uppercase tracking-wider">${s.instruction}</p>
                    <div class="flex flex-wrap gap-6 mb-8 text-sm font-medium text-slate-700">${legendHtml}</div>
                    <div class="matrix-grid" id="matrix-container"></div>
                    <div class="mt-6 pt-4 border-t border-slate-200 text-xs text-slate-600 space-y-1">${footnotesHtml}</div>
                </div>
            </div>
        </section>`;
    }

    /* ── Section 3: Academic Grounding ── */
    function renderSection3(ag) {
        const clustersHtml = ag.clusters.map(c => {
            const papersHtml = c.papers.map((p, i) => {
                const border = i < c.papers.length - 1 ? 'border-b border-slate-200 pb-2' : '';
                const noteSpan = p.note ? ` <span class="text-slate-500">[${p.note}]</span>` : '';
                const linked = p.url
                    ? `<a href="${p.url}" target="_blank" rel="noopener noreferrer" class="hover:text-blue-700 hover:underline">${p.citation}</a>`
                    : p.citation;
                return `<li class="text-xs font-mono text-slate-700 leading-relaxed ${border}">${linked}${noteSpan}</li>`;
            }).join('');
            const cellTags = (c.cells && c.cells.length)
                ? `<div class="flex flex-wrap gap-1 mt-3 pt-3 border-t border-slate-200">${c.cells.map(id => {
                    const cell = DATA.cells[id];
                    return cell ? `<span class="text-[10px] font-semibold px-2 py-0.5 rounded-full bg-slate-200 text-slate-700 border border-slate-300">${cell.title}</span>` : '';
                  }).join('')}</div>`
                : '';
            return `
            <div class="border border-slate-200 border-l-4 ${borderLColors[c.color]} rounded-xl p-5 bg-slate-50">
                <div class="text-sm font-semibold ${textColors[c.color]} uppercase tracking-widest mb-4 flex items-center gap-2">
                    <span class="text-base">${c.emoji}</span> ${c.name}
                </div>
                <ul class="space-y-2">${papersHtml}</ul>
                ${cellTags}
            </div>`;
        }).join('');

        return `
        <details class="mb-16">
            <summary class="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-slate-300 cursor-pointer select-none hover:bg-slate-50 transition-colors list-none">
                <h2 class="text-2xl font-semibold text-slate-900 flex items-center gap-3">
                    <span class="bg-slate-900 text-white w-8 h-8 rounded-full flex items-center justify-center text-sm">${ag.number}</span>
                    ${ag.title}
                    <span class="ml-auto text-slate-400 text-lg">&#9662;</span>
                </h2>
            </summary>
        <div class="bg-white p-6 md:p-8 rounded-b-2xl shadow-sm border border-slate-300 border-t-0 -mt-4">
            <p class="text-slate-600 font-medium mb-8 max-w-3xl">${ag.description}</p>
            <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">${clustersHtml}</div>
        </div>
        </details>`;
    }

    /* ── Matrix cell rendering (called after render() builds the DOM) ── */
    const riskBgColors = { safe: 'bg-emerald-50', edu: 'bg-blue-50', warn: 'bg-amber-50', danger: 'bg-rose-50' };
    const riskHoverColors = { safe: 'hover:bg-emerald-100', edu: 'hover:bg-blue-100', warn: 'hover:bg-amber-100', danger: 'hover:bg-rose-100' };

    function renderMatrix() {
        const container = document.getElementById('matrix-container');
        if (!container || !DATA) return;

        const { aiStates, humanStates, cells } = DATA;
        let html = `<div class="flex items-end justify-center pb-2"><span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">AI \\ Human →</span></div>`;

        humanStates.forEach(s => {
            html += `
                <div class="flex flex-col justify-end pb-3 border-b-2 border-slate-200">
                    <div class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Human</div>
                    <div class="font-semibold text-slate-900 text-sm">${s.name}</div>
                    <div class="text-xs text-slate-600">${s.short}</div>
                </div>`;
        });

        aiStates.forEach(aiState => {
            html += `
                <div class="flex flex-col justify-center pr-3 border-r-2 border-slate-300 text-right">
                    <div class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">AI</div>
                    <div class="font-semibold text-slate-900 text-sm">${aiState.name}</div>
                    <div class="text-xs text-slate-600">${aiState.short}</div>
                </div>`;

            humanStates.forEach(humanState => {
                const id = `${aiState.id}-${humanState.id}`;
                const data = cells[id];
                const bg = riskBgColors[data.risk] || 'bg-white';
                const hoverBg = riskHoverColors[data.risk] || 'hover:bg-slate-50';
                const sycoBadge = data.syco
                    ? `<div class="absolute top-1 right-1 bg-purple-700 text-white text-[9px] font-semibold px-1.5 py-0.5 rounded-full uppercase tracking-wider">Compliance Risk</div>`
                    : '';
                html += `
                    <button id="cell-${id}" type="button" aria-label="${data.title} — ${DATA.riskLabels[data.risk].text}"
                         class="matrix-cell relative p-4 rounded-xl border border-slate-300 border-l-[6px] cursor-pointer cell-transition ${bg} ${hoverBg} text-slate-900 shadow-sm flex flex-col justify-center min-h-[100px] ${data.color} text-left focus:outline-none focus:ring-2 focus:ring-slate-900 focus:ring-offset-2"
                         onclick="selectCell('${id}')">
                        <div class="font-semibold text-sm leading-tight text-center">${data.title}</div>
                        ${sycoBadge}
                    </button>`;
            });
        });

        container.innerHTML = html;
    }

    /* ── Cell selection / modal ── */
    let currentSelectedId = null;

    const riskBorderColors = {
        'safe': 'border-emerald-600',
        'edu': 'border-blue-600',
        'warn': 'border-amber-500',
        'danger': 'border-rose-600'
    };

    function normalizeSopItems(items, fallbackText) {
        if (Array.isArray(items)) {
            return items.filter(Boolean);
        }
        if (typeof items === 'string' && items.trim()) {
            return [items.trim()];
        }
        if (typeof fallbackText === 'string' && fallbackText.trim()) {
            return [fallbackText.trim()];
        }
        return [];
    }

    function renderSopItems(items) {
        return items.map((item, index) => `
            <li class="flex items-start gap-3">
                <span class="mt-0.5 flex h-6 w-6 shrink-0 items-center justify-center rounded-full bg-slate-900 text-[11px] font-semibold text-white">${index + 1}</span>
                <span class="text-slate-700 font-medium leading-relaxed">${item}</span>
            </li>`).join('');
    }

    function copyPrompt(id, button) {
        const promptElement = document.getElementById(`prompt-text-${id}`);
        if (!promptElement || !button) return;

        const promptText = promptElement.textContent.trim();
        const originalLabel = button.dataset.defaultLabel || button.textContent.trim();
        button.dataset.defaultLabel = originalLabel;

        const markCopied = () => {
            button.textContent = 'Copied';
            window.setTimeout(() => {
                button.textContent = originalLabel;
            }, 1600);
        };

        const fallbackCopy = () => {
            const textarea = document.createElement('textarea');
            textarea.value = promptText;
            textarea.setAttribute('readonly', '');
            textarea.style.position = 'fixed';
            textarea.style.opacity = '0';
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand('copy');
            document.body.removeChild(textarea);
            markCopied();
        };

        if (navigator.clipboard && typeof navigator.clipboard.writeText === 'function') {
            navigator.clipboard.writeText(promptText).then(markCopied).catch(fallbackCopy);
            return;
        }

        fallbackCopy();
    }

    function selectCell(id) {
        if (!DATA) return;
        if (currentSelectedId) {
            document.getElementById(`cell-${currentSelectedId}`)?.classList.remove('selected-cell');
        }
        document.getElementById(`cell-${id}`).classList.add('selected-cell');
        currentSelectedId = id;

        const [aiId, humanId] = id.split('-');
        const aiState = DATA.aiStates.find(s => s.id === aiId);
        const humanState = DATA.humanStates.find(s => s.id === humanId);
        const data = DATA.cells[id];
        const risk = DATA.riskLabels[data.risk];
        const modalBorderColor = riskBorderColors[data.risk];
        const riskText = data.risk_outline || '';
        const humanSopItems = normalizeSopItems(data.human_sop);
        const aiPrompt = data.ai_prompt || '';
        const recognition = data.recognition || '';
        const exampleShort = data.example_short || '';
        const doneWhen = data.done_when || '';
        const laterText = data.later || '';
        const transitionTo = data.transition_to || '';
        const triageBanner = data.triage_banner || '';
        const sycoShort = data.syco_short || '';

        const citationsHtml = (data.citations && data.citations.length > 0)
            ? data.citations.map(c => {
                if (c.url) {
                    return `<p><a href="${c.url}" target="_blank" rel="noopener noreferrer" class="hover:text-blue-700 hover:underline">${c.text}</a></p>`;
                }
                return `<p>${c.text}</p>`;
            }).join('')
            : '<p class="text-slate-500 italic">No citations listed for this cell.</p>';

        const detailsHtml = `
            <div class="p-6 md:p-8 border-b-2 border-slate-200 flex items-start justify-between bg-white pr-16 rounded-t-2xl border-t-[8px] ${modalBorderColor}">
                <div>
                    <div class="flex items-center gap-2 mb-3">
                        <span class="px-3 py-1 rounded-full text-xs font-semibold uppercase tracking-wider text-white ${risk.bg}">${risk.text}</span>
                        ${data.syco ? '<span class="px-2 py-1 rounded-full text-xs font-semibold uppercase tracking-wider text-white bg-purple-700">Compliance Risk</span>' : ''}
                    </div>
                    <h2 id="modal-title" class="text-3xl md:text-4xl font-semibold text-slate-900 tracking-tight">${data.title}</h2>
                    <p class="text-slate-600 text-sm mt-2"><span class="font-semibold">AI:</span> ${aiState.name} × <span class="font-semibold">Human:</span> ${humanState.name}</p>
                </div>
            </div>
            <div class="p-6 md:p-8 flex flex-col gap-4 bg-slate-50 rounded-b-2xl">
                <!-- Triage Banner (warn/danger only) -->
                ${triageBanner ? `
                <div class="rounded-xl px-5 py-3 font-bold text-sm tracking-wide flex items-center gap-2 ${data.risk === 'danger' ? 'bg-rose-100 text-rose-900 border border-rose-300' : 'bg-amber-100 text-amber-900 border border-amber-300'}">
                    <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01M5.93 19h12.14c1.54 0 2.502-1.667 1.732-3L13.73 5c-.77-1.333-2.694-1.333-3.464 0L4.2 16c-.77 1.333.192 3 1.73 3z"></path></svg>
                    ${triageBanner}
                </div>` : ''}
                <!-- Recognition Cue -->
                <div class="bg-slate-100 rounded-xl px-5 py-4 border border-slate-200">
                    <p class="text-sm text-slate-700 leading-relaxed"><span class="font-semibold text-slate-900">You are here if:</span> ${recognition}</p>
                    ${exampleShort ? `<p class="text-xs text-slate-500 italic mt-2">e.g. ${exampleShort}</p>` : ''}
                </div>
                <!-- DO NOW + Done When -->
                <div class="bg-white p-5 rounded-xl border border-slate-300 border-l-[6px] border-l-blue-600 shadow-sm">
                    <h3 class="text-xs font-semibold text-blue-600 uppercase tracking-widest mb-3 flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path></svg>
                        DO NOW
                    </h3>
                    <ol class="space-y-2">${renderSopItems(humanSopItems)}</ol>
                    ${doneWhen ? `
                    <div class="border-t border-slate-200 mt-4 pt-3 flex items-start gap-2">
                        <svg class="w-4 h-4 text-emerald-600 mt-0.5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                        <p class="text-sm text-slate-700"><span class="font-semibold text-emerald-700">Done when:</span> ${doneWhen}</p>
                    </div>` : ''}
                </div>
                <!-- Drawer: Why This Matters -->
                ${riskText ? `
                <details open class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
                    <summary class="flex items-center gap-2 px-5 py-3 cursor-pointer text-xs font-semibold text-slate-500 uppercase tracking-widest select-none hover:text-slate-700 transition-colors">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M5.93 19h12.14c1.54 0 2.502-1.667 1.732-3L13.73 5c-.77-1.333-2.694-1.333-3.464 0L4.2 16c-.77 1.333.192 3 1.73 3z"></path></svg>
                        Why This Matters
                        <span class="ml-auto text-slate-400">&#9662;</span>
                    </summary>
                    <div class="px-5 pb-4 pt-1 border-t border-slate-100 space-y-3">
                        <p class="text-sm text-slate-700 leading-relaxed">${riskText}</p>
                        ${sycoShort ? `
                        <div class="flex items-start gap-2 bg-purple-50 border border-purple-200 rounded-lg px-4 py-3">
                            <svg class="w-4 h-4 text-purple-600 mt-0.5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                            <p class="text-sm text-purple-900 font-medium">${sycoShort}</p>
                        </div>` : ''}
                    </div>
                </details>` : ''}
                <!-- Drawer: After This -->
                ${(laterText || transitionTo) ? `
                <details open class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
                    <summary class="flex items-center gap-2 px-5 py-3 cursor-pointer text-xs font-semibold text-slate-500 uppercase tracking-widest select-none hover:text-slate-700 transition-colors">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6"></path></svg>
                        After This
                        <span class="ml-auto text-slate-400">&#9662;</span>
                    </summary>
                    <div class="px-5 pb-4 pt-1 border-t border-slate-100 space-y-2">
                        ${laterText ? `<p class="text-sm text-slate-700"><span class="font-semibold text-slate-900">Later:</span> ${laterText}</p>` : ''}
                        ${transitionTo ? `<p class="text-sm text-slate-700"><span class="font-semibold text-slate-900">Transition:</span> ${transitionTo}</p>` : ''}
                    </div>
                </details>` : ''}
                <!-- Drawer: Detection prompt -->
                ${aiPrompt ? `
                <details class="bg-slate-900 rounded-xl border border-slate-800 shadow-sm overflow-hidden">
                    <summary class="flex items-center gap-2 px-5 py-3 cursor-pointer text-xs font-semibold text-slate-300 uppercase tracking-widest select-none hover:text-white transition-colors">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16h6M7 4h10a2 2 0 012 2v12l-3-2-3 2-3-2-3 2V6a2 2 0 012-2z"></path></svg>
                        Detection Prompt
                        <span class="ml-auto text-slate-500">&#9662;</span>
                    </summary>
                    <div class="px-5 pb-5 pt-1 border-t border-slate-800">
                        <div class="flex items-center justify-end mb-3">
                            <button type="button"
                                    class="inline-flex items-center gap-2 rounded-lg border border-slate-600 bg-slate-800 px-3 py-2 text-xs font-semibold uppercase tracking-widest text-slate-200 hover:bg-slate-700 focus:outline-none focus:ring-2 focus:ring-white"
                                    onclick="copyPrompt('${id}', this)">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16h8M8 12h8m-7 8h6a2 2 0 002-2V6.828a2 2 0 00-.586-1.414l-2.828-2.828A2 2 0 0012.172 3H9a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
                                Copy Prompt
                            </button>
                        </div>
                        <p id="prompt-text-${id}" class="text-slate-100 font-mono text-sm leading-relaxed whitespace-pre-line">${aiPrompt}</p>
                    </div>
                </details>` : ''}
                <!-- Drawer: Reference (Epistemic Context + Academic Grounding) -->
                <details class="bg-slate-50 rounded-xl border border-slate-200">
                    <summary class="p-4 cursor-pointer text-xs font-semibold text-slate-500 uppercase tracking-widest flex items-center gap-2 list-none select-none hover:text-slate-700 transition-colors">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.746 0 3.332.477 4.5 1.253v13C19.832 18.477 18.246 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
                        Reference
                        <span class="ml-auto text-slate-400">&#9662;</span>
                    </summary>
                    <div class="px-4 pb-4 space-y-4">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div class="bg-white p-4 rounded-xl border border-slate-300 shadow-sm">
                                <div class="text-xs font-semibold text-slate-500 uppercase tracking-widest mb-2">AI State</div>
                                <div class="font-semibold text-slate-900">${aiState.name}</div>
                                <div class="text-sm text-slate-700 mt-1">${aiState.desc}</div>
                            </div>
                            <div class="bg-white p-4 rounded-xl border border-slate-300 shadow-sm">
                                <div class="text-xs font-semibold text-slate-500 uppercase tracking-widest mb-2">Human State</div>
                                <div class="font-semibold text-slate-900">${humanState.name}</div>
                                <div class="text-sm text-slate-700 mt-1">${humanState.desc}</div>
                            </div>
                        </div>
                        <div class="text-xs text-slate-700 space-y-1 font-mono">${citationsHtml}</div>
                    </div>
                </details>
            </div>`;

        document.getElementById('modal-content').innerHTML = detailsHtml;
        openModal();
    }

    function openModal() {
        document.getElementById('details-modal').classList.remove('hidden');
        document.body.style.overflow = 'hidden';
        document.addEventListener('keydown', handleEscape);
    }

    function closeModal() {
        document.getElementById('details-modal').classList.add('hidden');
        document.body.style.overflow = '';
        document.removeEventListener('keydown', handleEscape);
        if (currentSelectedId) {
            document.getElementById(`cell-${currentSelectedId}`)?.classList.remove('selected-cell');
            currentSelectedId = null;
        }
    }

    function handleEscape(e) {
        if (e.key === 'Escape') closeModal();
    }

    /* ── Boot ── */
    render();
    </script>
</body>
</html>
